<svg width="600" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <!-- Arc Reactor Circle -->
  <circle cx="300" cy="300" r="120" fill="none" stroke="#00d4ff" stroke-width="8"/>
  <circle cx="300" cy="300" r="100" fill="none" stroke="#00d4ff" stroke-width="4"/>
  <circle cx="300" cy="300" r="80" fill="#00d4ff" opacity="0.3"/>
  
  <!-- Inner Glow -->
  <circle cx="300" cy="300" r="60" fill="#00d4ff" opacity="0.5"/>
  <circle cx="300" cy="300" r="40" fill="#ffffff" opacity="0.8"/>
  
  <!-- Title -->
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">IRON MAN</text>
  <text x="300" y="550" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00d4ff" text-anchor="middle">EVOLUTION</text>
  
  <!-- Subtitle -->
  <text x="300" y="620" font-family="Arial, sans-serif" font-size="18" fill="#cccccc" text-anchor="middle">De la Cueva al Nanotech</text>
  
  <!-- Author -->
  <text x="300" y="700" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">Diego Saavedra García</text>
  
  <!-- Decorative Lines -->
  <line x1="100" y1="580" x2="200" y2="580" stroke="#00d4ff" stroke-width="2"/>
  <line x1="400" y1="580" x2="500" y2="580" stroke="#00d4ff" stroke-width="2"/>
</svg>
